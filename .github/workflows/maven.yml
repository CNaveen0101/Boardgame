name: mycustompipeline

on:
  push:
    branches: [ main ]

jobs:
  Build_Test:
   runs-on: mynewrunner
   steps:
   - name: Checkout code
     uses: actions/checkout@v6

   - name: Set up Java
     uses: actions/setup-java@v3
     with:
      distribution: 'temurin'
      java-version: '11'

   - name: unit test
     run: mvn test

   - name: sonar test
     uses: SonarSource/sonarqube-scan-action@v7.0.0
     env:
       SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
       SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}

   - name: Building the artifact
     run: mvn clean package
  
   - name: Login to Docker Hub
     uses: docker/login-action@v4
     with:
       username: ${{ vars.DOCKERHUB_USERNAME }}
       password: ${{ secrets.DOCKERHUB_TOKEN }}
      
   -  name: Set up QEMU
      uses: docker/setup-qemu-action@v4
  
   -  name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
    
   -  name: Build and push
      uses: docker/build-push-action@v7
      with:
        push: true
        tags: ${{ vars.DOCKERHUB_USERNAME }}/app:${{ github.run_id }}

   -   name: Updating the image tag in deployment.yaml
       run: |
        sed -i "s|image:.*|image: ${{ vars.DOCKERHUB_USERNAME }}/app:${{ github.run_id }}|g" deployment-service.yaml

  
  
   -   name: Deploy to Kubernetes
       run: kubectl apply -f deployment-service.yaml
        
