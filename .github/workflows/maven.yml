name: mycustompipeline

on:
  push:
    branches: [ main ]

jobs:
  Build_Test:
   runs-on: mynewrunner
   steps:
   - name: Checkout code
     uses: actions/checkout@v6

   - name: Set up Java
     uses: actions/setup-java@v3
     with:
      distribution: 'temurin'
      java-version: '11'

   - name: unit test
     run: mvn test
