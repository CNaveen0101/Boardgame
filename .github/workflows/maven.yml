name: mycustompipelines

on:
  push:
    branches: [ main ]

jobs:
  setup-install:
   runs-on: mynewrunner
   steps:
   - name: Checkout code
     uses: actions/checkout@v6

   - name: Set up Java
     uses: actions/setup-java@v3
     with:
      distribution: 'temurin'
      java-version: '11'
 
  Test:
    runs-on: myrunner
    needs: setup-install
    steps:
    - name: unit test
      run: mvn test

